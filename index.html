<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>O Segredo da Floresta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- MENU -->
        <div id="screen-menu" class="screen active">
            <canvas id="menuCanvas" width="320" height="240"></canvas>
        </div>

        <!-- JOGO -->
        <div id="screen-game" class="screen">
            <canvas id="gameCanvas" width="320" height="240"></canvas>
        </div>

        <!-- CUTSCENE FINAL -->
        <div id="screen-cutscene" class="screen">
            <canvas id="cutsceneCanvas" width="320" height="240"></canvas>
        </div>

        <!-- GAME OVER -->
        <div id="screen-gameover" class="screen">
            <canvas id="gameoverCanvas" width="320" height="240"></canvas>
        </div>
    </div>

    <!-- Controles mobile -->
    <div id="mobile-controls">
        <div class="ctrl-left">
            <button class="ctrl-btn" id="btn-left">◀</button>
            <button class="ctrl-btn" id="btn-right">▶</button>
        </div>
        <div class="ctrl-right">
            <button class="ctrl-btn" id="btn-jump">▲</button>
            <button class="ctrl-btn" id="btn-fire">🔥</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
